<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>APace — Admin Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1B4332;
      --blue: #40916C;
      --blue-light: #D8F3DC;
      --mint: #95D5B2;
      --white: #FFFFFF;
      --ink: #111827;
      --muted: #6B7280;
      --border: #B7E4C7;
    }

    body {
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: var(--ink);
      background: #F4FAF6;
      min-height: 100vh;
    }

    /* ===== PASSWORD GATE ===== */
    #gate {
      position: fixed;
      inset: 0;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 1000;
    }

    .gate-card {
      background: var(--white);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);
      text-align: center;
    }

    .gate-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .gate-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .gate-input {
      width: 100%;
      height: 50px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 0 18px;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s ease;
      margin-bottom: 14px;
    }

    .gate-input:focus { border: 2px solid var(--blue); }

    .gate-error {
      display: none;
      color: #EF4444;
      font-size: 13px;
      margin-bottom: 14px;
    }

    .btn {
      background: var(--blue);
      color: var(--white);
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .btn:hover { background: #2D6A4F; transform: scale(1.01); }
    .gate-card .btn { width: 100%; }

    /* ===== DASHBOARD ===== */
    #dashboard { display: none; }

    .topbar {
      background: var(--navy);
      padding: 20px 0;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .topbar h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
    }

    .topbar h1 span { color: var(--mint); }

    .panel {
      margin-top: 28px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(27, 67, 50, 0.07);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .stat {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
    }

    .stat span {
      display: inline-block;
      background: var(--blue-light);
      color: var(--navy);
      border-radius: 100px;
      padding: 2px 12px;
      margin-left: 6px;
    }

    .btn-refresh {
      background: transparent;
      color: var(--blue);
      border: 1.5px solid var(--blue);
      border-radius: 10px;
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .btn-refresh:hover { background: var(--blue-light); }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      text-align: left;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 14px 24px;
      background: #F4FAF6;
      border-bottom: 1px solid var(--border);
    }

    tbody td {
      padding: 14px 24px;
      border-bottom: 1px solid #EEF6F0;
      font-size: 15px;
      color: var(--ink);
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #F8FCFA; }

    .col-num { width: 56px; color: var(--muted); }
    .col-date { color: var(--muted); white-space: nowrap; }
    .email { font-weight: 500; }

    .state {
      padding: 48px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
    }

    .state.error { color: #EF4444; }

    .footnote {
      max-width: 960px;
      margin: 16px auto 40px;
      padding: 0 24px;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 560px) {
      .col-date { display: none; }
      thead th.col-date { display: none; }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       PASSWORD GATE
       NOTE: This password check runs in the browser, so it is a
       light privacy screen, NOT real security — anyone who views
       the page source can read ADMIN_PASSWORD below. See the
       SECURITY NOTE at the bottom of the script for how to make
       this page genuinely private.
       ============================================================ -->
  <div id="gate">
    <form class="gate-card" id="gate-form">
      <div class="gate-title">Admin Access</div>
      <div class="gate-sub">Enter the password to view signups.</div>
      <input type="password" id="gate-input" class="gate-input" placeholder="Password" autocomplete="current-password" autofocus>
      <div class="gate-error" id="gate-error">Incorrect password. Try again.</div>
      <button type="submit" class="btn">Unlock</button>
    </form>
  </div>

  <!-- ===== DASHBOARD ===== -->
  <div id="dashboard">
    <div class="topbar">
      <div class="container topbar-inner">
        <h1><span>AP</span>ace — Waitlist Admin</h1>
        <button class="btn-refresh" id="logout-btn">Lock</button>
      </div>
    </div>

    <div class="container">
      <div class="panel">
        <div class="panel-head">
          <div class="stat" id="count">Total signups <span id="count-num">—</span></div>
          <button class="btn-refresh" id="refresh-btn">Refresh</button>
        </div>
        <div id="table-wrap">
          <div class="state" id="loading">Loading signups…</div>
        </div>
      </div>
    </div>

    <p class="footnote">
      Live data from your Supabase <strong>leads</strong> table. Emails are sorted newest first.
    </p>
  </div>

  <script>
    /* ============================================================
       CONFIG — OWNER: fill these in.
       SUPABASE_URL + SUPABASE_ANON_KEY: same values as in index.html
       (Supabase dashboard → Project Settings → API).
       ADMIN_PASSWORD: choose any password to unlock this page.
       ============================================================ */
    const SUPABASE_URL = 'https://hlfxdkbqjuvpvervcbdw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhsZnhka2JxanV2cHZlcnZjYmR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzOTE0NDksImV4cCI6MjA5Njk2NzQ0OX0.P6sK10ZLlLAdAOMhoauhl32TdG-8c_YFlfnUmebIACU';
    const LEADS_TABLE = 'leads';
    const ADMIN_PASSWORD = 'APace2026!';

    var gate = document.getElementById('gate');
    var gateForm = document.getElementById('gate-form');
    var gateInput = document.getElementById('gate-input');
    var gateError = document.getElementById('gate-error');
    var dashboard = document.getElementById('dashboard');
    var tableWrap = document.getElementById('table-wrap');
    var countNum = document.getElementById('count-num');

    // ---- Password gate ----
    gateForm.addEventListener('submit', function (e) {
      e.preventDefault();
      if (gateInput.value === ADMIN_PASSWORD) {
        sessionStorage.setItem('apace_admin', '1');
        unlock();
      } else {
        gateError.style.display = 'block';
        gateInput.value = '';
        gateInput.focus();
      }
    });

    function unlock() {
      gate.style.display = 'none';
      dashboard.style.display = 'block';
      loadLeads();
    }

    // Stay unlocked for the rest of the browser session.
    if (sessionStorage.getItem('apace_admin') === '1') {
      unlock();
    }

    document.getElementById('logout-btn').addEventListener('click', function () {
      sessionStorage.removeItem('apace_admin');
      location.reload();
    });

    document.getElementById('refresh-btn').addEventListener('click', loadLeads);

    // ---- Fetch + render ----
    function setState(html, isError) {
      tableWrap.innerHTML = '<div class="state' + (isError ? ' error' : '') + '">' + html + '</div>';
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }

    function formatDate(value) {
      if (!value) return '—';
      var d = new Date(value);
      if (isNaN(d)) return '—';
      return d.toLocaleString(undefined, {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    async function loadLeads() {
      setState('Loading signups…', false);
      try {
        var res = await fetch(
          SUPABASE_URL + '/rest/v1/' + LEADS_TABLE + '?select=*&order=created_at.desc',
          {
            headers: {
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
            }
          }
        );

        if (!res.ok) {
          var detail = await res.text();
          setState('Could not load data (HTTP ' + res.status + ').<br>' + escapeHtml(detail), true);
          countNum.textContent = '—';
          return;
        }

        var rows = await res.json();
        countNum.textContent = rows.length;

        if (!rows.length) {
          setState('No signups yet.', false);
          return;
        }

        var html = '<table><thead><tr>' +
          '<th class="col-num">#</th>' +
          '<th>Email</th>' +
          '<th class="col-date">Signed up</th>' +
          '</tr></thead><tbody>';

        rows.forEach(function (row, i) {
          html += '<tr>' +
            '<td class="col-num">' + (i + 1) + '</td>' +
            '<td class="email">' + escapeHtml(row.email || '—') + '</td>' +
            '<td class="col-date">' + escapeHtml(formatDate(row.created_at)) + '</td>' +
            '</tr>';
        });

        html += '</tbody></table>';
        tableWrap.innerHTML = html;
      } catch (err) {
        setState('Network error — check your Supabase URL and key, then refresh.', true);
        countNum.textContent = '—';
      }
    }

    /* ============================================================
       SECURITY NOTE (please read):
       1. The password above is visible to anyone who opens this
          file's source. It keeps casual visitors out, but it is
          NOT strong protection.
       2. For the table to load, your Supabase Row Level Security
          must allow the anon key to SELECT from "leads". That means
          anyone who has the anon key (it is public in index.html)
          could read the table directly, bypassing this page.
       For genuinely private data, use Supabase Auth (email login +
       an RLS policy that only allows your account to read), or move
       reads behind a Supabase Edge Function / server you control.
       ============================================================ */
  </script>

</body>
</html>
